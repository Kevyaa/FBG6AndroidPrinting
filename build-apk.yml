name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev cmake \
            ccache patch gettext

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      - name: Cache project .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-project-

      - name: Build APK
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghost6-wifi-print-apk
          path: bin/*.apk
          if-no-files-found: error
